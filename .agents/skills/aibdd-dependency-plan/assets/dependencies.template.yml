# =============================================================================
# dependencies.yml — 全專案外部依賴 registry（2026-07-14 裁決 10）
# 落檔：specs/dependencies/dependencies.yml（唯一一份；registry 即配置 SSOT，不入 isa.yml）
# 每個依賴一個 entry，只收 per-dependency 變動資料；細節 truth 檔依資料夾分配
# 於 specs/dependencies/<name>/。surface 細節不重抄——由 truth 檔本身承載
# （openapi 即 operations、convention.md 即 keyspaces、asyncapi 即 channels）。
# kind 級常數（handler、custom 句式模版、prehandling 骨架、testability 預設）
# 內建於 skill assets/kind-constants/<kind>.yml，下游依 entry.kind 查表。
# =============================================================================
dependencies:

  # ── kind: api 條目範例（第三方 HTTP API；webhook 回打為 facet，payload 真相
  #    住 truth 檔，callback endpoint 歸 api-plan）──
  - name: {{NAME}}                    # 例：ecpay-payment。全域唯一、業務名 kebab-case
    kind: api                         # v1 值域：api|store|channel
    summary: {{ONE_LINE}}
    truth:
      acquisition: {{user-provided|web-official}}   # 自放 <name>/ 優先；否則網路官方文件取得落檔
      format: openapi
      ref: specs/dependencies/{{NAME}}/openapi.yml
      origin_url: {{URL|null}}        # web-official 必填
      evidence: {{verified|derived|assumed}}
    wiring:
      sut_property_overrides:
        - {{SUT_CONFIG_KEY}}          # 例：payment.ecpay.base-url（prehandling 據此改指 stub）
    testability_overrides: {}         # 僅偏離 kind 預設時填（例：official-emulator image）

  # ── kind: store 條目範例（schema-free 外部儲存；RDB 同構 NoSQL 不在此）──
  - name: {{NAME}}                    # 例：session-cache
    kind: store
    engine: {{redis|s3|mongodb|elasticsearch}}   # container 依 engine 查 kind-constants
    summary: {{ONE_LINE}}
    truth:
      source: {{native|authored}}     # per-engine 分流見 rules/kind-store.md
      format: {{json-schema|index-template|ft-schema|convention}}
      ref: specs/dependencies/{{NAME}}/{{TRUTH_FILE}}   # authored 用 convention.md（keyspace/ttl 住這）
      evidence: {{verified|derived|assumed}}
    wiring:
      sut_property_overrides: []      # service_connection: true 的 engine 免列
    testability_overrides: {}

  # ── kind: channel 條目範例（MQ topic/queue）──
  - name: {{NAME}}                    # 例：order-events
    kind: channel
    broker: {{kafka|rabbitmq}}        # container 依 broker 查 kind-constants
    summary: {{ONE_LINE}}
    truth:
      source: {{native|authored}}     # AsyncAPI 首選；channels/messages 細節住 truth 檔
      format: {{asyncapi|avro|json-schema|convention}}
      ref: specs/dependencies/{{NAME}}/asyncapi.yml
      evidence: {{verified|derived|assumed}}
    wiring:
      sut_property_overrides: []
    testability_overrides: {}
