# =============================================================================
# kind constants — api（kind 級常數；每個 api 依賴皆同，不抄進 registry）
# 下游（dsl-refine／red-execute）依 entry.kind 查本檔取素材；
# 槽位值取自 registry entry（specs/dependencies/dependencies.yml 的該依賴條目）與其 truth 檔。
# =============================================================================
kind: api

testability_defaults:
  double: generic-stub                # 該服務有官方模擬器時 entry 可覆寫 double 與 image
  programmable: true
  container:
    image: wiremock/wiremock:3.9.1
    ports: [8080]
    wait_strategy: http:/__admin/health
    service_connection: false         # 走 DynamicPropertyRegistry 覆寫 entry.wiring.sut_property_overrides

handlers: [external-stub, interaction-verifier]

isa_step_templates:
  # B — 樁：Given 外部服務對某 operation 回應 X
  - handler: external-stub
    keyword: Given
    format_template: ^外部服務 "(?P<boundary>[^"]+)" 對 (?P<operation>[^ ]+) 回應, with JSON:$
    data_format: json
    slots:
      boundary: entry.name
      operation: truth 檔（openapi）的 operationId
      payload: 依該 operation 的 response_ref schema 填空（不得發明 truth 外欄位）
    behavior:
      reads: [registry entry（specs/dependencies/dependencies.yml）與其 truth 檔, context.memo]
      effect: 於替身佈建 match(operation)→respond(payload) 規則
      asserts: null
      export_vars: { stubId: { type: String, description: 供 E 面對照 } }
    intent_projection: "前置：以 stub 讓 {{name}} 的 {{operation}} 回傳指定回應（WHAT，不含替身工具細節）"
  # E 正面 — Then 應被呼叫 n 次
  - handler: interaction-verifier
    keyword: Then
    format_template: ^外部服務 "(?P<boundary>[^"]+)" 的 (?P<operation>[^ ]+) 應被呼叫 (?P<times>\d+) 次$
    data_format: null
    slots:
      boundary: entry.name
      operation: truth 檔（openapi）的 operationId
      times: 整數
      timeout: 預設住 config
    behavior:
      reads: [替身接收紀錄, context.memo]
      effect: null
      asserts: 收到符合 request_ref matcher 的請求恰 times 次（bounded-wait）
      export_vars: null
    intent_projection: "驗證：{{name}} 的 {{operation}} 曾被以指定 payload 呼叫 {{times}} 次"
  # E 反面 — Then 不應被呼叫
  - handler: interaction-verifier
    keyword: Then
    format_template: ^外部服務 "(?P<boundary>[^"]+)" 的 (?P<operation>[^ ]+) 不應被呼叫$
    data_format: null
    slots:
      boundary: entry.name
      operation: truth 檔（openapi）的 operationId
      window: 觀察窗（住 config 預設；反面等滿窗判定，與正面 timeout 語意相反）
    behavior:
      reads: [替身接收紀錄, context.memo]
      effect: null
      asserts: 觀察窗內對該 operation 的請求數 == 0
      export_vars: null
    intent_projection: "驗證：此情境下 {{name}} 的 {{operation}} 不應被呼叫"

red_execute:
  scope: 只實作兩類 mock——B 設定預期回應、E 驗證請求送達/未送達（契約測試規格）；
         SUT 業務行為的觸發與斷言交 builtin（api_call/response_validate）
  prehandling_template: |
    // WireMock testcontainer；base URL 覆寫到 entry.wiring.sut_property_overrides
    @Container static GenericContainer<?> {{name}}Stub =
        new GenericContainer<>("{{container.image}}").withExposedPorts(8080);
    @DynamicPropertySource static void props(DynamicPropertyRegistry r) {
        r.add("{{sut_property}}", () -> "http://localhost:" + {{name}}Stub.getMappedPort(8080));
    }
  stepdef_constants:
    stub_client: WireMock admin API（__admin/mappings 佈建、__admin/requests 查收）
    forbidden:
      - 不得真連外（Forbidden 承 external-stub handler）
      - 不得斷言 truth 未宣告的欄位
      - E 正面不得無界等待（timeout 必填）；E 反面以觀察窗判定
