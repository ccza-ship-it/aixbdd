# -----------------------------------------------------------------------------
# Stack-specific tail (java-e2e) — append 至 shared/.aibdd/arguments.yml 末尾
# -----------------------------------------------------------------------------

# STARTER_VARIANT — kickoff 本專案技術的 technical archetype。
STARTER_VARIANT: java-e2e

# PRESET_KIND — boundary preset；backend stack 必填。
PRESET_KIND: web-service

# -----------------------------------------------------------------------------
# 7. JAVA_E2E_STARTER_OUTPUT_PATHS — Maven coordinates / Java 套件落點 / 版本鎖在本檔。
# 想自訂 GROUP_ID 或 BASE_PACKAGE 請直接編此檔；想升版改下面 version 區塊。
# -----------------------------------------------------------------------------

# Maven coordinates — pom.xml <groupId> / <artifactId>。
GROUP_ID: com.example
ARTIFACT_ID: ${KICKOFF_TLB_ID}

# BASE_PACKAGE — Java 主套件名（dot-separated）；
# 由 02-execute-layout/SOP.md 依「${GROUP_ID}.<artifact_id 去 hyphen>」derive。
BASE_PACKAGE: ${KICKOFF_BASE_PACKAGE}

# Stack versions — 由 starter 寫進 pom.xml properties。升版直接編這幾行。
JAVA_VERSION: '25'
SPRING_BOOT_VERSION: '4.0.6'
CUCUMBER_VERSION: '7.34.3'
JJWT_VERSION: '0.12.6'

# Local PostgreSQL（docker-compose）— acceptance 由 Testcontainers 動態啟動，不讀本區。
POSTGRES_IMAGE_VERSION: '18'
DB_NAME: ${KICKOFF_TLB_ID}
DB_USER: postgres
DB_PASSWORD: postgres
DB_PORT: '5432'

# -----------------------------------------------------------------------------
# 8. INSTALL_SPECTRUM — 是否安裝 aibdd-spectrum（specformula）測試框架。
# 由 kickoff Q6（install_spectrum）回答決定：true → auto-starter 在 pom.xml 加入
# specformula 依賴（specformula-cucumber / specformula-testcontainer / specformula-dsl，
# 版本 0.0.5、test scope，從 Maven Central 取得）與 specformula-dsl preprocess plugin
# （.dsl.feature → .isa.feature）。false → 保持乾淨 pom。僅 java_e2e 生效。
# -----------------------------------------------------------------------------
INSTALL_SPECTRUM: ${KICKOFF_INSTALL_SPECTRUM}
