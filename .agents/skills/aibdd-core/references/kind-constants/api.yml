# =============================================================================
# kind constants — api（kind 級常數；每個 api 依賴皆同，不抄進 registry）
# 下游（dsl-refine／red-execute）依 entry.kind 查本檔取素材；
# 槽位值取自 registry entry（specs/dependencies/dependencies.yml 的該依賴條目）與其 truth 檔。
# =============================================================================
testability_defaults:
  double: generic-stub                # 該服務有官方模擬器時 entry 可覆寫 double 與 image
  programmable: true
  container:
    image: wiremock/wiremock:3.9.1
    ports: [8080]
    wait_strategy: http:/__admin/health
    service_connection: false         # 走 DynamicPropertyRegistry 覆寫 entry.wiring.sut_property_overrides

handlers: [external-stub, interaction-verifier]

# custom 句式模版（框架 custom 契約 schema）。slots／filling 指引見 rules/kind-api.md；
# 執行語意見下方 red_execute。dsl-refine 取 format＋intent＋data_format 模版填空宣告契約。
isa_step_templates:
  # B — Given 設定外部服務對某 operation 的預期回應（stub）
  - name: 外部服務 stub 回應
    format: ^外部服務 "(?P<boundary>[^"]+)" 對 (?P<operation>[^ ]+) 回應, with JSON:$
    instruction_type: custom
    handler: external-stub
    data_format: json
    intent: 前置（Given）：以 stub 讓 {{boundary}} 的 {{operation}} 回傳指定回應
  # E — Then 驗證 operation 被呼叫的次數
  - name: 外部服務應被呼叫次數
    format: ^外部服務 "(?P<boundary>[^"]+)" 的 (?P<operation>[^ ]+) 應被呼叫 (?P<times>\d+) 次$
    instruction_type: custom
    handler: interaction-verifier
    intent: 驗證（Then）：{{boundary}} 的 {{operation}} 曾被呼叫 {{times}} 次
  # E — Then 驗證 operation 被呼叫且送出的 payload 欄位值符合（含 outbound 內容）
  - name: 外部服務應被呼叫並送出 payload
    format: ^外部服務 "(?P<boundary>[^"]+)" 的 (?P<operation>[^ ]+) 應被呼叫並送出, with table:$
    instruction_type: custom
    handler: interaction-verifier
    data_format: data_table
    intent: 驗證（Then）：{{boundary}} 的 {{operation}} 曾被呼叫，且送出的 payload 欄位值符合預期
  # E — Then 驗證 operation 不應被呼叫
  - name: 外部服務不應被呼叫
    format: ^外部服務 "(?P<boundary>[^"]+)" 的 (?P<operation>[^ ]+) 不應被呼叫$
    instruction_type: custom
    handler: interaction-verifier
    intent: 驗證（Then）：此情境下 {{boundary}} 的 {{operation}} 不應被呼叫

red_execute:
  scope: 只實作兩類 mock——B 設定預期回應、E 驗證請求送達/未送達（契約測試規格）；
         SUT 業務行為的觸發與斷言交 builtin（api_call/response_validate）
  prehandling_template: |
    // WireMock testcontainer；base URL 覆寫到 entry.wiring.sut_property_overrides
    @Container static GenericContainer<?> {{name}}Stub =
        new GenericContainer<>("{{container.image}}").withExposedPorts(8080);
    @DynamicPropertySource static void props(DynamicPropertyRegistry r) {
        r.add("{{sut_property}}", () -> "http://localhost:" + {{name}}Stub.getMappedPort(8080));
    }
  stepdef_constants:
    stub_client: WireMock admin API（__admin/mappings 佈建、__admin/requests 查收）
    forbidden:
      - 不得真連外（Forbidden 承 external-stub handler）
      - 不得斷言 truth 未宣告的欄位
      - E 正面不得無界等待（timeout 必填）；E 反面以觀察窗判定
