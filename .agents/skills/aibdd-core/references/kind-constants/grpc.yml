# =============================================================================
# kind constants — grpc（kind 級常數）
# 槽位值取自 registry entry 與其 truth 檔（proto）。
# 已知天花板：不得斷言 grpc-status／trailer；streaming 順序語意範圍外。
# =============================================================================
testability_defaults:
  double: generic-stub                # grpcmock（stub 同形態）；需掛 proto descriptor
  programmable: true
  container:
    tool: grpcmock
    in_process: true                  # 可 in-process；獨立行程另配 image
    descriptor_source: 由 truth 檔（proto）編譯產生

handlers: [external-stub, interaction-verifier]

# custom 句式模版（框架 custom 契約 schema）。slots／filling 指引見 rules/kind-grpc.md；
# 執行語意見下方 red_execute。
isa_step_templates:
  # B — Given 設定 rpc 的預期回應（stub；與 api kind 同形，operation 換 rpc）
  - name: 外部服務 rpc stub 回應
    format: ^外部服務 "(?P<boundary>[^"]+)" 對 (?P<rpc>[^ ]+) 回應, with JSON:$
    instruction_type: custom
    handler: external-stub
    data_format: json
    intent: 前置（Given）：以 stub 讓 {{boundary}} 的 {{rpc}} 回傳指定回應
  # E — Then 驗證 rpc 被呼叫次數（訊息欄位可斷言；grpc-status 不可）
  - name: 外部服務 rpc 應被呼叫次數
    format: ^外部服務 "(?P<boundary>[^"]+)" 的 (?P<rpc>[^ ]+) 應被呼叫 (?P<times>\d+) 次$
    instruction_type: custom
    handler: interaction-verifier
    intent: 驗證（Then）：{{boundary}} 的 {{rpc}} 曾被呼叫 {{times}} 次
  # E — Then 驗證 rpc 不應被呼叫
  - name: 外部服務 rpc 不應被呼叫
    format: ^外部服務 "(?P<boundary>[^"]+)" 的 (?P<rpc>[^ ]+) 不應被呼叫$
    instruction_type: custom
    handler: interaction-verifier
    intent: 驗證（Then）：此情境下 {{boundary}} 的 {{rpc}} 不應被呼叫

red_execute:
  scope: 契約測試兩句式（B＋E 正反面）；grpc-status／trailer／streaming 順序不測
  prehandling_template: |
    // grpcmock in-process；proto descriptor 由 truth 檔編譯產生
    static GrpcMock {{name}}Stub = GrpcMock.grpcMock().build();
    @DynamicPropertySource static void props(DynamicPropertyRegistry r) {
        r.add("{{sut_property}}", () -> "localhost:" + {{name}}Stub.getPort());
    }
  stepdef_constants:
    codegen_input: truth 檔 proto → client stub／message builder（填空素材）
    forbidden:
      - 不得斷言 grpc-status／trailer
      - streaming rpc 的順序語意不入 Gherkin（範圍外）
      - E 正面不得無界等待
